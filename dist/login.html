<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Smart Stock- Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Tailwind CDN -->
    <link rel="stylesheet" href="./output.css" />
    <link rel="stylesheet" href="./all.min.css" />
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
        }
    </style>
</head>

<body class="text-gray-300 bg-gray-900">
    <!-- NAV -->
    <header class="w-full border-b border-gray-200 bg-gray-900">
        <div class="max-w-5xl mx-auto flex items-center justify-center px-4 py-3 text-xs">
            <div class="flex items-center justify-center">
                <div class="logo"><span class=" text-3xl font-bold text-white">Smart Stock </span></div>
                <!-- <span class="font-semibold">EduConnect</span> -->
            </div>
        </div>
    </header>

    <!-- CONTENT -->
    <main class="min-h-[calc(100vh-56px)] flex items-center justify-center px-4">
        <div class="w-full max-w-md bg-gray-800 border border-gray-100 rounded-xl px-6 md:px-8 py-10">
            <h1 class="text-xl md:text-2xl font-semibold text-green-700 mb-2">
                Login
            </h1>
            <p class="text-xs text-green-200 mb-6">
                Enter your email and password to access your account.
            </p>

            <form class="space-y-5 text-xs">
                <div>
                    <label class="block mb-1 text-black-600">Email</label>
                    <input type="email" id="email" name="email" class="w-full h-9 rounded-md border border-gray-200 bg-[#F5F7FA] px-3 focus:outline-none focus:ring-1 focus:ring-black" />
                </div>

                <div>
                    <label class="block mb-1 text-black-600">Password</label>
                    <input type="password"  id="password"  name= "password" class=" w-full h-9 rounded-md border text-black- border-gray-200 bg-[#F5F7FA] px-3 focus:outline-none focus:ring-1 focus:ring-black" />
                </div>

                <div class="flex items-center justify-between text-[11px]">
                    <label class="inline-flex items-center gap-1 text-gray-600">
              <input type="checkbox" class="rounded border-black-300" />
              <span>Remember me</span>
            </label>
                    <a href="#" class="text-green-700 hover:text-green-200 hover:underline">
              Forgot password?
            </a>
                </div>


                <button type="submit" class="w-full mt-2 inline-flex items-center justify-center px-4 py-2 rounded-full bg-gray-900 text-white text-xs hover:bg-white hover:text-gray-900">
                 <a href="overview.html" > Sign in</a>     
                     </button>
            </form>

            <p class="mt-6 text-[11px] text-center text-gray-500">
                Don’t have an account?
                <a href="signup.html" class="text-green-700 hover:text-green-200 font-medium underline">
            Sign up
          </a>
            </p>

        </div>
        </div>
    </main>
     
<script src="profile/script.js"></script>
</body>
</html>
</body>

</html>
